apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sepia.fullname" . }}
  labels:
    {{- include "sepia.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sepia.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "sepia.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sepia
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.chromium.noSandbox }}
            - name: SEPIA_NO_SANDBOX
              value: "1"
            {{- end }}
            {{- if .Values.existingSecret }}
            - name: {{ .Values.existingSecretKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: {{ .Values.existingSecretKey }}
            {{- end }}
            {{- if .Values.litellm.enabled }}
            - name: SEPIA_MODEL_ENDPOINT
              value: "http://localhost:{{ .Values.litellm.port }}/v1"
            - name: SEPIA_MODEL
              value: {{ .Values.litellm.defaultModel | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.litellm.enabled }}
        - name: litellm
          image: {{ .Values.litellm.image | quote }}
          ports:
            - name: litellm
              containerPort: {{ .Values.litellm.port }}
              protocol: TCP
          args: ["--config", "/etc/litellm/litellm.yaml", "--port", {{ .Values.litellm.port | quote }}]
          {{- if .Values.litellm.configSecret }}
          volumeMounts:
            - name: litellm-config
              mountPath: /etc/litellm
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.litellm.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
        {{- end }}
      {{- if and .Values.litellm.enabled .Values.litellm.configSecret }}
      volumes:
        - name: litellm-config
          secret:
            secretName: {{ .Values.litellm.configSecret }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
