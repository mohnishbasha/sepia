name: CodeQL

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # Run weekly so new vulnerability rules catch previously-clean code.
  schedule:
    - cron: '17 3 * * 1'   # every Monday at 03:17 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Static analysis (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@86dbaf4b509bfc3b6dbed34009070cfae815ffde  # v3.37.2
        with:
          languages: javascript-typescript
          # security-and-quality includes both CWE-based security rules and
          # code-quality rules (dead code, injection paths, prototype pollution).
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@86dbaf4b509bfc3b6dbed34009070cfae815ffde  # v3.37.2

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@86dbaf4b509bfc3b6dbed34009070cfae815ffde  # v3.37.2
        with:
          category: /language:javascript-typescript
