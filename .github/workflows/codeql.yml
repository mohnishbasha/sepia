name: CodeQL

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # Run weekly so new vulnerability rules catch previously-clean code.
  schedule:
    - cron: '17 3 * * 1'   # every Monday at 03:17 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Static analysis (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # security-and-quality includes both CWE-based security rules and
          # code-quality rules (dead code, injection paths, prototype pollution).
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
