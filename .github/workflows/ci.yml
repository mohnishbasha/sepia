name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.18.0'
  PNPM_VERSION: '9.12.3'

# All jobs run in parallel; the "ci" gate job waits for all and acts as the
# single required check for branch protection.

jobs:
  # ── Quality: lint + typecheck + format check ────────────────────────────────
  # No browser needed — runs fast (~2 min).
  quality:
    name: Lint · Typecheck · Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9  # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm eslint .

      - name: Typecheck (tsc --noEmit)
        run: pnpm tsc --noEmit

      - name: Format check (Prettier)
        run: pnpm prettier --check "**/*.{ts,mjs,json,md}" --ignore-path .gitignore

  # ── Build: TypeScript compile ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9  # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tsc -p tsconfig.build.json

  # ── Test: full suite + code coverage ───────────────────────────────────────
  test:
    name: Test (coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9  # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --only-shell --with-deps chromium

      - name: Test with coverage
        run: pnpm vitest run --coverage

      - name: Upload coverage report (lcov)
        # Upload even when tests fail so engineers can see which lines are missing.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  # ── Security: dependency audit ──────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9  # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (fail on critical CVEs)
        run: pnpm audit --audit-level=critical

  # ── Dependency review (PRs only) ────────────────────────────────────────────
  # Blocks merging when a PR adds a dependency with a known vulnerability.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high

  # ── CI gate: required status check ─────────────────────────────────────────
  # Branch protection should require only this job. It passes iff all
  # required jobs above pass, giving a single stable check name to pin.
  ci:
    name: CI gate
    needs: [quality, build, test, security]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()

    steps:
      - name: Evaluate required jobs
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results: $results"
          failed=0
          for job in quality build test security; do
            result=$(echo "$results" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['$job']['result'])")
            echo "  $job → $result"
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs passed."
