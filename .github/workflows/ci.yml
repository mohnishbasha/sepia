name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.11.0'
  PNPM_VERSION: '9.12.3'

# All jobs run in parallel; the "ci" gate job waits for all and acts as the
# single required check for branch protection.

jobs:
  # ── Quality: lint + typecheck + format check ────────────────────────────────
  # No browser needed — runs fast (~2 min).
  quality:
    name: Lint · Typecheck · Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm eslint .

      - name: Typecheck (tsc --noEmit)
        run: pnpm tsc --noEmit

      - name: Format check (Prettier)
        run: pnpm prettier --check "**/*.{ts,mjs,json,md}" --ignore-path .gitignore

  # ── Build: TypeScript compile ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tsc -p tsconfig.build.json

  # ── Test: full suite + code coverage ───────────────────────────────────────
  test:
    name: Test (coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Test with coverage
        run: pnpm vitest run --coverage

      - name: Upload coverage report (lcov)
        # Upload even when tests fail so engineers can see which lines are missing.
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  # ── Security: dependency audit ──────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (fail on critical CVEs)
        run: pnpm audit --audit-level=critical

  # ── Dependency review (PRs only) ────────────────────────────────────────────
  # Blocks merging when a PR adds a dependency with a known vulnerability.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ── CI gate: required status check ─────────────────────────────────────────
  # Branch protection should require only this job. It passes iff all
  # required jobs above pass, giving a single stable check name to pin.
  ci:
    name: CI gate
    needs: [quality, build, test, security]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()

    steps:
      - name: Evaluate required jobs
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results: $results"
          failed=0
          for job in quality build test security; do
            result=$(echo "$results" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['$job']['result'])")
            echo "  $job → $result"
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs passed."
