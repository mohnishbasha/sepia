name: Docker

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Dedicated tag for registry-based layer cache.
  # Persists beyond the 7-day GHA cache TTL; survives runner rotation.
  BUILDCACHE_REF: ghcr.io/${{ github.repository }}:buildcache

jobs:
  build-push:
    name: Build and push OCI image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Build for amd64 only; add linux/arm64 here if multi-arch is needed
          # (arm64 emulation via QEMU adds ~3× build time on amd64 runners).
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Two-layer cache strategy:
          #   1. GHA cache (fast, per-branch, 10 GB limit, 7-day TTL)
          #   2. Registry cache (persistent, survives runner rotation and cold starts)
          # cache-from tries both; first hit wins.
          cache-from: |
            type=gha
            type=registry,ref=${{ env.BUILDCACHE_REF }}
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.BUILDCACHE_REF }},mode=max
          provenance: true
          sbom: true
