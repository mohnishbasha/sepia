model_list:
  # Anthropic (primary)
  - model_name: anthropic/claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # OpenAI
  - model_name: openai/gpt-4o
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # Ollama — local Hermes 2 (no key needed)
  - model_name: ollama/nous-hermes2
    litellm_params:
      model: ollama/nous-hermes2
      api_base: http://host.docker.internal:11434

  # Ollama — local Llama 3.1 8B
  - model_name: ollama/llama3.1
    litellm_params:
      model: ollama/llama3.1
      api_base: http://host.docker.internal:11434

  # Groq — fast inference
  - model_name: groq/llama-3.1-70b-versatile
    litellm_params:
      model: groq/llama-3.1-70b-versatile
      api_key: os.environ/GROQ_API_KEY

# Automatic fallback chain: if claude-sonnet-4-6 fails (rate limit, outage),
# retry with nous-hermes2 then groq. All transparent to Sepia.
router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - anthropic/claude-sonnet-4-6:
        - ollama/nous-hermes2
        - groq/llama-3.1-70b-versatile

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # any string; used as the proxy API key

litellm_settings:
  drop_params: true   # silently drop unsupported params (e.g. json_mode on Ollama)
  request_timeout: 60
